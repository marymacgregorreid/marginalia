<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 285" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <!-- Background zone -->
  <rect x="10" y="0" width="660" height="278" rx="12" fill="#dbe4ff" fill-opacity="0.25" stroke="#4a9eed" stroke-width="0.75"/>

  <!-- Step 1: Upload or Paste -->
  <rect x="40" y="55" width="112" height="90" rx="9" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="96" y="42" text-anchor="middle" font-size="18">📄</text>
  <text x="96" y="96" text-anchor="middle" font-size="15" fill="#000000">Upload</text>
  <text x="96" y="113" text-anchor="middle" font-size="15" fill="#000000">or Paste</text>
  <text x="96" y="168" text-anchor="middle" font-size="11" fill="#ffffff">Drag a .docx or paste</text>
  <text x="96" y="182" text-anchor="middle" font-size="11" fill="#ffffff">text directly</text>
  <text x="96" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#4a9eed">Step 1</text>

  <!-- Arrow 1→2 -->
  <line x1="152" y1="100" x2="194" y2="100" stroke="#4a9eed" stroke-width="2"/>
  <polygon points="194,94 202,100 194,106" fill="#4a9eed"/>

  <!-- Step 2: Guide & Analyze -->
  <rect x="202" y="55" width="112" height="90" rx="9" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="258" y="42" text-anchor="middle" font-size="18">🤖</text>
  <text x="258" y="96" text-anchor="middle" font-size="15" fill="#000000">Guide &amp;</text>
  <text x="258" y="113" text-anchor="middle" font-size="15" fill="#000000">Analyze</text>
  <text x="258" y="168" text-anchor="middle" font-size="11" fill="#ffffff">Pick a tone, add</text>
  <text x="258" y="182" text-anchor="middle" font-size="11" fill="#ffffff">custom instructions</text>
  <text x="258" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#8b5cf6">Step 2</text>

  <!-- Arrow 2→3 -->
  <line x1="314" y1="100" x2="356" y2="100" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="356,94 364,100 356,106" fill="#8b5cf6"/>

  <!-- Step 3: Review & Refine -->
  <rect x="364" y="55" width="112" height="90" rx="9" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="42" text-anchor="middle" font-size="18">✏️</text>
  <text x="420" y="96" text-anchor="middle" font-size="15" fill="#000000">Review &amp;</text>
  <text x="420" y="113" text-anchor="middle" font-size="15" fill="#000000">Refine</text>
  <text x="420" y="168" text-anchor="middle" font-size="11" fill="#ffffff">Accept, reject, or</text>
  <text x="420" y="182" text-anchor="middle" font-size="11" fill="#ffffff">modify suggestions</text>
  <text x="420" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">Step 3</text>

  <!-- Arrow 3→4 -->
  <line x1="476" y1="100" x2="518" y2="100" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="518,94 526,100 518,106" fill="#f59e0b"/>

  <!-- Step 4: Export .docx -->
  <rect x="526" y="55" width="112" height="90" rx="9" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5"/>
  <text x="582" y="42" text-anchor="middle" font-size="18">📥</text>
  <text x="582" y="96" text-anchor="middle" font-size="15" fill="#000000">Export</text>
  <text x="582" y="113" text-anchor="middle" font-size="15" fill="#000000">.docx</text>
  <text x="582" y="168" text-anchor="middle" font-size="11" fill="#ffffff">Download polished</text>
  <text x="582" y="182" text-anchor="middle" font-size="11" fill="#ffffff">manuscript</text>
  <text x="582" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#22c55e">Step 4</text>

  <!-- Re-analyze loop (dashed) -->
  <path d="M420,150 L420,252 L258,252 L258,150" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="252,157 258,145 264,157" fill="#ec4899"/>
  <text x="339" y="270" text-anchor="middle" font-size="11" fill="#ec4899" font-style="italic">Re-analyze &amp; iterate</text>
</svg>

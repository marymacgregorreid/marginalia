name: Delete Infrastructure

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "The environment to delete the application infrastructure for"
        required: true
        type: string
      AZURE_ENV_NAME:
        description: "The name of the Azure environment"
        required: true
        type: string
      AZURE_LOCATION:
        description: "The Azure region to deploy the application resources to"
        required: true
        type: string

    secrets:
      AZURE_TENANT_ID:
        description: "The Azure tenant ID to use for authentication to Azure for deployment"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "The Azure subscription ID to use for authentication to Azure for deployment"
        required: true
      AZURE_CLIENT_ID:
        description: "The Azure client ID to use for authentication to Azure for deployment"
        required: true

jobs:
  delete-infrastructure:
    name: Delete Infrastructure ${{ inputs.ENVIRONMENT }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || inputs.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_PRINCIPAL_ID_TYPE: 'ServicePrincipal'

    environment: ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Authenticate Azure CLI (Federated Credentials)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Infrastructure
        run: |
          echo "Deleting infrastructure..."

          RESOURCE_GROUP="rg-${AZURE_ENV_NAME}"
          echo "Checking if resource group '${RESOURCE_GROUP}' still exists..."
          if az group exists --name "$RESOURCE_GROUP" 2>/dev/null | grep -qi "true"; then
            echo "Resource group '${RESOURCE_GROUP}' still exists. Deleting via Azure CLI..."
            az group delete --name "$RESOURCE_GROUP" --yes
            echo "Resource group deleted."
          else
            echo "Resource group '${RESOURCE_GROUP}' does not exist or was already deleted."
          fi

          # Purge any soft-deleted Cognitive Services resources that were in the resource group.
          # These block future deployments with the same name if not purged.
          echo "Checking for soft-deleted Cognitive Services resources to purge..."
          DELETED_ACCOUNTS=$(az cognitiveservices account list-deleted \
            --subscription "$AZURE_SUBSCRIPTION_ID" \
            --query "[?contains(id, '${RESOURCE_GROUP}')]" -o json 2>/dev/null || echo "[]")

          if [ "$DELETED_ACCOUNTS" != "[]" ] && [ -n "$DELETED_ACCOUNTS" ]; then
            echo "$DELETED_ACCOUNTS" | jq -c '.[]' | while read -r account; do
              ACCOUNT_NAME=$(echo "$account" | jq -r '.name')
              ACCOUNT_LOCATION=$(echo "$account" | jq -r '.location')
              ACCOUNT_RG=$(echo "$account" | jq -r '.id' | sed 's|.*/resourceGroups/\([^/]*\)/.*|\1|')
              echo "Purging soft-deleted Cognitive Services account: $ACCOUNT_NAME (location: $ACCOUNT_LOCATION)"
              az cognitiveservices account purge \
                --name "$ACCOUNT_NAME" \
                --resource-group "$ACCOUNT_RG" \
                --location "$ACCOUNT_LOCATION" || true
            done
          else
            echo "No soft-deleted Cognitive Services resources found to purge."
          fi

          echo "Cleanup completed."
